<div class="fixed top-20 right-4 z-[60] space-y-3">
  <div *ngFor="let notification of notifications"
    [class]="getColorClass(notification.type)"
    class="w-[90vw] sm:min-w-[300px] sm:max-w-md rounded-lg shadow-2xl text-white p-3 sm:p-4 flex items-center gap-3 animate-slide-in-right">

    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-xl font-bold">
      {{getIcon(notification.type)}}
    </div>

    <p class="flex-1 font-medium">{{notification.message}}</p>

    <button (click)="close(notification.id)" class="flex-shrink-0 hover:bg-white/20 p-1 rounded transition-all">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
