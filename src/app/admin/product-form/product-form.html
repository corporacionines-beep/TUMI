<div class="min-h-screen bg-gray-100">
  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
    <div class="container mx-auto px-4 sm:px-6 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold">{{isEditing ? 'Editar' : 'Nuevo'}} Producto</h1>
          <p class="text-blue-100 text-sm mt-1">Completa los datos del producto</p>
        </div>
       <button (click)="goBack()" class="bg-white text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-lg font-semibold transition-all shadow-md">
  ← Volver
</button>
      </div>
    </div>
  </header>

  <div class="container mx-auto px-4 sm:px-6 py-8">
    <div class="max-w-4xl mx-auto">
      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-4 sm:p-8">
          <div class="space-y-6">
            <!-- Nombre del Producto -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                Nombre del Producto *
              </label>
              <input
                type="text"
                [(ngModel)]="productForm.name"
                placeholder="Ej: Audífonos Bluetooth"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>

            <!-- Descripción -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                Descripción *
              </label>
              <textarea
                [(ngModel)]="productForm.description"
                rows="3"
                placeholder="Describe las características del producto"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              ></textarea>
            </div>

            <!-- Precios -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Precio de Venta (S/.) *
                </label>
                <input
                  type="number"
                  [(ngModel)]="productForm.price"
                  step="0.01"
                  placeholder="25.99"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Precio Original (S/.)
                </label>
                <input
                  type="number"
                  [(ngModel)]="productForm.originalPrice"
                  step="0.01"
                  placeholder="89.99"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>

            <!-- Stock y Categoría -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Stock *
                </label>
                <input
                  type="number"
                  [(ngModel)]="productForm.stock"
                  placeholder="100"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Categoría *
                </label>
                <select
                  [(ngModel)]="productForm.category"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                  <option value="">Seleccionar categoría</option>
                  <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
                </select>
              </div>
            </div>

            <!-- Rating y Reviews -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Rating (0-5)
                </label>
                <input
                  type="number"
                  [(ngModel)]="productForm.rating"
                  step="0.1"
                  min="0"
                  max="5"
                  placeholder="4.5"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                  Número de Reviews
                </label>
                <input
                  type="number"
                  [(ngModel)]="productForm.reviewCount"
                  placeholder="1000"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>

            <!-- URL de Imagen -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                URL de Imagen *
              </label>
              <input
                type="url"
                [(ngModel)]="productForm.imageUrl"
                placeholder="https://example.com/image.jpg"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <p class="text-xs text-gray-500 mt-1">
                Puedes usar imágenes de Unsplash: https://images.unsplash.com/photo-...
              </p>
            </div>

            <!-- Preview de Imagen -->
            <div *ngIf="productForm.imageUrl" class="border border-gray-200 rounded-lg p-4">
              <p class="text-sm font-semibold text-gray-700 mb-2">Vista Previa:</p>
              <img [src]="productForm.imageUrl" alt="Preview" class="w-48 h-48 object-cover rounded-lg"/>
            </div>

            <!-- Tags -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                Tags
              </label>
              <div class="flex gap-2 mb-2">
                <button
                  *ngFor="let tag of availableTags"
                  (click)="toggleTag(tag)"
                  [class]="isTagSelected(tag) ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'"
                  class="px-4 py-2 rounded-full text-sm font-medium hover:opacity-80 transition-all"
                >
                  {{tag}}
                </button>
              </div>
            </div>

            <!-- Envío Gratis -->
            <div class="flex items-center gap-3">
              <input
                type="checkbox"
                [(ngModel)]="productForm.isFreeShipping"
                id="freeShipping"
                class="w-5 h-5 text-blue-600 rounded focus:ring-2 focus:ring-blue-500"
              />
              <label for="freeShipping" class="text-sm font-semibold text-gray-700">
                Envío Gratis
              </label>
            </div>

            <!-- Botones -->
            <!-- Botones -->
<div class="flex gap-4 pt-6 border-t border-gray-200">
  <button
    (click)="goBack()"
    class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-semibold text-center transition-colors"
  >
    Cancelar
  </button>
  <button
    (click)="saveProduct()"
    class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-lg hover:from-blue-700 hover:to-indigo-800 font-semibold transition-all shadow-md hover:shadow-lg"
  >
    {{isEditing ? 'Guardar Cambios' : 'Crear Producto'}}
  </button>
</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
